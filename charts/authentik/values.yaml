# TODO: Make real secrets

authentik:
  authentik:
    secret_key: "PleaseGenerateA50CharKey"
    error_reporting:
      enabled: false
    postgresql:
      password: "ThisIsNotASecurePassword"

  server:
    service:
      type: LoadBalancer
    ingress:
      enabled: false
      hosts:
        - authentik.domain.tld

  postgresql:
    enabled: true
    auth:
      password: "ThisIsNotASecurePassword"

  redis:
    enabled: true

  worker:
    livenessProbe:
      timeoutSeconds: 5
    startupProbe:
      initialDelaySeconds: 60
      timeoutSeconds: 5
    readinessProbe:
      timeoutSeconds: 5

  blueprints:
    configMaps: 
      - authentik-blueprints-configmap
