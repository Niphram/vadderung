{{- $secretName :=  "mealie-sso-secret" }}
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: mealie-sso-sealed
  namespace: default
spec:
  encryptedData:
    MEALIE_CLIENT_ID: 
    MEALIE_CLIENT_SECRET: 
  template:
    metadata:
      creationTimestamp: null
      name: mealie-sso-secret
      namespace: default
---
apiVersion: v1
kind: Secret
metadata:
  name: mealie-blueprint
stringData:
  blueprint.yaml: |-
    version: 1
    metadata:
      labels:
        blueprints.goauthentik.io/description: Blueprint for Mealie
        blueprints.goauthentik.io/instantiate: "true"
      name: Mealie

    entries:
      - attrs:
          name: Mealie
          authorization_flow:
            !Find [
              authentik_flows.flow,
              [slug, default-provider-authorization-implicit-consent],
            ]
          client_type: confidential
          client_id: env://MEALIE_CLIENT_ID
          client_secret: env://MEALIE_CLIENT_SECRET
          redirect_uris:
            - matching_mode: strict
              url: http://192.168.178.212/login
            - matching_mode: strict
              url: http://192.168.178.212/login?direct=1
          signing_key:
            !Find [
              authentik_crypto.certificatekeypair,
              [name, authentik Self-signed Certificate],
            ]
          invalidation_flow:
            !Find [authentik_flows.flow, [slug, default-invalidation-flow]]
          access_code_validity: minutes=1
          access_token_validity: minutes=5
          refresh_token_validity: days=30
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
          sub_mode: user_email
          include_claims_in_id_token: true
          issuer_mode: per_provider
        conditions: []
        id: mealie_provider
        identifiers:
          name: Provider for Mealie
        model: authentik_providers_oauth2.oauth2provider
        state: present

      - attrs:
          name: Mealie
          slug: mealie
          provider: !KeyOf mealie_provider
          policy_engine_mode: any
          meta_launch_url: http://192.168.178.212/api/auth/oauth
        conditions: []
        id: mealie_application
        identifiers:
          name: Mealie
        model: authentik_core.application
        state: present
