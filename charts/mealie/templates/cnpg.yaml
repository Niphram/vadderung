apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: mealie-data
spec:
  instances: {{ .Values.postgres.instances }}
  imageName: ghcr.io/cloudnative-pg/postgresql:17.5-6
  storage:
    size: 2Gi
  managed:
    roles:
    - name: app
      ensure: present
      login: true
      superuser: {{ .Values.postgres.superuser }}
