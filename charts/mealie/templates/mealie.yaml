apiVersion: apps/v1
kind: Deployment
metadata:
  name: mealie-deployment
spec:
  selector:
    matchLabels:
      app: mealie-app
  replicas: 1
  template:
    metadata:
      labels:
        app: mealie-app
    spec:
      containers:
        - name: mealie-app
          image: ghcr.io/mealie-recipes/mealie:2.8.0
          ports:
            - containerPort: 9000
          env:
          - name: ALLOW_SIGNUP
            value: "false"
          - name: PUID
            value: 1000
          - name: PGID
            value: 1000
          - name: TZ
            value: Europe/Berlin
          - name: MAX_WORKERS
            value: 1
          - name: WEB_CONCURRENCY
            value: 1
---
kind: Service
apiVersion: v1
metadata:
  name: mealie-app-service
spec:
  selector:
    app: mealie-app
  ports:
    - protocol: TCP
      targetPort: 9000
      port: 9000
  type: LoadBalancer