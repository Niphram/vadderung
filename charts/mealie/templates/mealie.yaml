apiVersion: apps/v1
kind: Deployment
metadata:
  name: mealie-deployment
spec:
  selector:
    matchLabels:
      app: mealie-app
  replicas: {{ .Values.mealie.replicas }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mealie-app
    spec:
      containers:
        - name: mealie-app
          image: {{ .Values.mealie.image }}
          ports:
            - name: liveness-port
              containerPort: 9000
          livenessProbe:
            httpGet:
              path: /api/app/about
              port: liveness-port
            failureThreshold: 5
            periodSeconds: 10
          volumeMounts:
          - name: mealie-data
            mountPath: /app/data/
          env:
          - name: ALLOW_SIGNUP
            value: {{ .Values.mealie.allowSignup | quote }}
          - name: PUID
            value: "1000"
          - name: PGID
            value: "1000"
          - name: TZ
            value: {{ .Values.mealie.timezone | default "" }}
          - name: BASE_URL
            value: {{ .Values.mealie.baseURL | default "" }}
          # Postgres Variables
          - name: DB_ENGINE
            value: postgres
          - name: POSTGRES_USER
            valueFrom:
              secretKeyRef:
                name: {{ .Values.mealie.pgsecrets }}
                key: username
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ .Values.mealie.pgsecrets }}
                key: password
          - name: POSTGRES_SERVER
            valueFrom:
              secretKeyRef:
                name: {{ .Values.mealie.pgsecrets }}
                key: host
          - name: POSTGRES_PORT
            valueFrom:
              secretKeyRef:
                name: {{ .Values.mealie.pgsecrets }}
                key: port
          - name: POSTGRES_DB
            valueFrom:
              secretKeyRef:
                name: {{ .Values.mealie.pgsecrets }}
                key: dbname
          # Try to configure OIDC
          - name: OIDC_AUTH_ENABLED
            value: "true"
          - name: OIDC_CONFIGURATION_URL
            value: http://192.168.178.214/application/o/mealie/.well-known/openid-configuration
          - name: OIDC_CLIENT_ID
            value: Qjr91Uspd3pDpYzXLOoZTbTofENMz0HWE3Yx61Ig
          # - name: OIDC_CLIENT_SECRET
          #   value: 6FFQ0xxyPtqHXmQcnB4F3jJ8aeJ2ExrtQeMzXvStrRbQxSFUVoy6eoI3opT2pwsrQJsr4ykboEt79qtvmduvgSkapVXrH6ssX8NgceF2Fh2bjjbS2vCMb2bs2yE0xlNS
      volumes:
        - name: mealie-data
          persistentVolumeClaim:
            claimName: mealie-data-pvc
---
kind: Service
apiVersion: v1
metadata:
  name: mealie-app-service
spec:
  selector:
    app: mealie-app
  ports:
    - protocol: TCP
      targetPort: 9000
      port: 80
  type: LoadBalancer