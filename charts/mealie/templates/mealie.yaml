apiVersion: apps/v1
kind: Deployment
metadata:
  name: mealie-deployment
spec:
  selector:
    matchLabels:
      app: mealie-app
  replicas: 2
  template:
    metadata:
      labels:
        app: mealie-app
    spec:
      containers:
        - name: mealie-app
          image: ghcr.io/mealie-recipes/mealie:v2.8.0
          ports:
            - containerPort: 9000
          env:
          - name: ALLOW_SIGNUP
            value: "false"
          - name: PUID
            value: "1000"
          - name: PGID
            value: "1000"
          - name: TZ
            value: Europe/Berlin
          - name: MAX_WORKERS
            value: "1"
          - name: WEB_CONCURRENCY
            value: "1"
          # Postgres Variables
          - name: DB_ENGINE
            value: postgres
          - name: POSTGRES_USER
            valueFrom:
              secretKeyRef:
                name: mealie-data-app
                key: username
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mealie-data-app
                key: password
          - name: POSTGRES_SERVER
            valueFrom:
              secretKeyRef:
                name: mealie-data-app
                key: host
          - name: POSTGRES_PORT
            valueFrom:
              secretKeyRef:
                name: mealie-data-app
                key: port
          - name: POSTGRES_DB
            valueFrom:
              secretKeyRef:
                name: mealie-data-app
                key: dbname
---
kind: Service
apiVersion: v1
metadata:
  name: mealie-app-service
spec:
  selector:
    app: mealie-app
  ports:
    - protocol: TCP
      targetPort: 9000
      port: 9000
  type: LoadBalancer