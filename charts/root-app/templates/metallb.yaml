apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb
  namespace: metallb
spec:
  project: default
  sources:
    - chart: metallb/metallb
      repoURL: https://metallb.github.io/metallb
      targetRevision: v0.15.2
  destination:
    server: https://kubernetes.default.svc
    namespace: metallb-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
