apiVersion: "cilium.io/v2"
kind: CiliumLoadBalancerIPPool
metadata:
  name: "cilium-address-pool"
  namespace: {{ .Release.Namespace }}
spec:
  blocks:
    - start: "192.168.178.221"
      stop: "192.168.178.230"
  serviceSelector:
    matchExpressions:
      - { key: io.cilium/lb-ipam-ips, operator: DoesNotExist }
      - { key: cilium, operator: In, values: [ "yes" ] }
