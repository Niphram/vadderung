apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: debug-route
  labels:
    protected: "true"
spec:
  parentRefs:
    - name: internal-gateway
      namespace: envoy-gateway-system
      sectionName: https
      group: gateway.networking.k8s.io	
      kind: Gateway
  hostnames:
    - debug.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: hello-world-svc
          port: 80
          group: ''	
          kind: Service
          weight: 1