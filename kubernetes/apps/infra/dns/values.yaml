vadderung:
  baseDomain: ~

adguard-home:
  config:
    existingSecret: infra-dns-adguard-home-config
  persistence:
    conf:
      enabled: false
    work:
      enabled: false

  service:
    dns:
      type: LoadBalancer
      # Set this to "Local" after this PR is merged and cilium is updated https://github.com/cilium/cilium/pull/46399
      externalTrafficPolicy: Cluster
      annotations:
        io.cilium/lb-ipam-ips: 192.168.178.211
