vadderung:
  baseDomain: ~

adguard-home:
  config:
    existingSecret: infra-dns-adguard-home-config
  persistence:
    conf:
      enabled: false
    work:
      enabled: false

  service:
    dns:
      type: LoadBalancer
      externalTrafficPolicy: Local
      annotations:
        io.cilium/lb-ipam-ips: 192.168.178.211
