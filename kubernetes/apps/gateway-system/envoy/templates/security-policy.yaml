apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: 'authelia-extauthz-by-route'
  namespace: {{ .Release.Namespace }}
spec:
  targetRefs:
  - group: 'gateway.networking.k8s.io'
    kind: 'HTTPRoute'
    name: 'debug-route'
    namespace: default
  extAuth:
    headersToExtAuth:
    - 'accept'
    - 'cookie'
    - 'authorization'
    - 'proxy-authorization'
    - 'x-forwarded-proto'
    failOpen: false
    http:
      backendRefs:
      - name: 'authelia-service'
        namespace: 'auth'
        port: 80
        group: ''
        kind: Service
        weight: 1
      path: '/api/authz/ext-authz/'
      headersToBackend:
      - Remote-User
      - Remote-Groups
      - Remote-Name
      - Remote-Email
