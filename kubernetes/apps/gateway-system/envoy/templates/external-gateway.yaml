apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: external-gateway
  namespace: {{ .Release.Namespace }}
spec:
  infrastructure:
    annotations:
      "io.cilium/lb-ipam-ips": "192.168.178.214"
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: proxy-config
  gatewayClassName: envoy-gateway
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      port: 443
      protocol: HTTPS
      hostname: "*.{{ .Values.vadderung.baseDomain }}"
      tls:
        mode: Terminate
        certificateRefs:
          - group: ''
            kind: Secret
            name: default-tls
            namespace: cert-manager
      allowedRoutes:
        namespaces:
          from: All