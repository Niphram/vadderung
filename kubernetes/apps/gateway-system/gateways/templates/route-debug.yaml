apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authelia-http-route
  labels:
    protected: "true"
spec:
  parentRefs:
    - name: internal-gateway
      namespace: gateway-system
      sectionName: https
      group: gateway.networking.k8s.io	
      kind: Gateway
  hostnames:
    - "auth.{{ .Values.vadderung.baseDomain }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: echo-svc
          namespace: default
          port: 80
          group: ''	
          kind: Service
          weight: 1