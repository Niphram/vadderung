apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: books-route
  labels:
    protected: "true"
spec:
  parentRefs:
    - name: internal-gateway
      namespace: gateway-system
      sectionName: https
      group: gateway.networking.k8s.io	
      kind: Gateway
  hostnames:
    - "books.{{ .Values.vadderung.baseDomain }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: calibre-app-service
          namespace: default
          port: 80
          group: ''	
          kind: Service
          weight: 1
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: books-kobo-route
  labels:
    protected: "false"
spec:
  parentRefs:
    - name: internal-gateway
      namespace: gateway-system
      sectionName: https
      group: gateway.networking.k8s.io	
      kind: Gateway
  hostnames:
    - "books.{{ .Values.vadderung.baseDomain }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /kobo
      backendRefs:
        - name: calibre-app-service
          namespace: default
          port: 80
          group: ''	
          kind: Service
          weight: 1