apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: 'gateway-tls-secret'
  namespace: {{ .Release.Namespace }}
spec:
  from:
    - group: 'gateway.envoyproxy.io'
      kind: 'Gateway'
      namespace: 'gateway-system'
  to:
    - group: ''
      kind: 'Secret'
      name: 'default-tls'