apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-route
  namespace: {{ .Release.Namespace }}
  labels:
    protected: "true"
spec:
  parentRefs:
    - name: internal-gateway
      namespace: gateway-system
      sectionName: https
      group: gateway.networking.k8s.io	
      kind: Gateway
  hostnames:
    - "books.{{ .Values.vadderung.baseDomain }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: calibre-app-service
          port: 80
          group: ''	
          kind: Service
          weight: 1
      filters:
        # Remove authorization header from incoming requests.
        # CWA is configured to authorize using the headers coming from the reverse proxy, but only if no authorization header is sent
        - type: RequestHeaderModifier
          requestHeaderModifier:
            remove:
            - name: "Authorization"
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-kobo-route
  namespace: {{ .Release.Namespace }}
  labels:
    protected: "false"
spec:
  parentRefs:
    - name: internal-gateway
      namespace: gateway-system
      sectionName: https
      group: gateway.networking.k8s.io	
      kind: Gateway
  hostnames:
    - "books.{{ .Values.vadderung.baseDomain }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /kobo
      backendRefs:
        - name: calibre-app-service
          namespace: default
          port: 80
          group: ''	
          kind: Service
          weight: 1
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: {{ .Release.Name }}-allow-selector-sp
  namespace: {{ .Release.Namespace }}
spec:
  from:
  - group: gateway.envoyproxy.io
    kind: SecurityPolicy
    namespace: gateway-system
  to:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: {{ .Release.Name }}-route