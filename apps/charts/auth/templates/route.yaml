apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-route
  namespace: {{ .Release.Namespace }}
  labels:
    protected: "false"
spec:
  parentRefs:
    - name: internal-gateway
      namespace: gateway-system
      sectionName: https
      group: gateway.networking.k8s.io	
      kind: Gateway
  hostnames:
    - "auth.{{ .Values.vadderung.baseDomain }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: authelia-service
          port: 80
          group: ''	
          kind: Service
          weight: 1
