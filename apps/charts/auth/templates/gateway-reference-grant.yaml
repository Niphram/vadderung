apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: 'extauthz-authelia-svc'
  namespace: {{ .Release.Namespace }}
spec:
  from:
    - group: 'gateway.envoyproxy.io'
      kind: 'SecurityPolicy'
      namespace: 'gateway-system'
    - group: 'gateway.envoyproxy.io'
      kind: 'SecurityPolicy'
      namespace: 'default'
  to:
    - group: ''
      kind: 'Service'
      name: 'authelia-service'