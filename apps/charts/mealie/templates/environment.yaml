apiVersion: v1
kind: ConfigMap
metadata:
  name: mealie-env
data:
  PUID: "1000"
  PGID: "1000"
  ALLOW_SIGNUP: "false"
  TZ: "{{ .Values.mealie.timezone }}"
  BASE_URL: "https://mealie.{{ .Values.vadderung.baseDomain }}"

  ALLOW_PASSWORD_LOGIN: "false"

  OIDC_AUTH_ENABLED: "true"
  OIDC_SIGNUP_ENABLED: "true"
  OIDC_CONFIGURATION_URL: "https://auth.{{ .Values.vadderung.baseDomain }}/.well-known/openid-configuration"
  OIDC_CLIENT_ID_FILE: /run/secrets/oidc/id
  OIDC_CLIENT_SECRET_FILE: /run/secrets/oidc/secret
  OIDC_AUTO_REDIRECT: "true"
  OIDC_REMEMBER_ME: "true"
  OIDC_ADMIN_GROUP: admins
  OIDC_PROVIDER_NAME: SSO

  DB_ENGINE: postgres
  POSTGRES_USER_FILE: /etc/db-secret/user
  POSTGRES_PASSWORD_FILE: /etc/db-secret/password
  POSTGRES_SERVER_FILE: /etc/db-secret/host
  POSTGRES_PORT_FILE: /etc/db-secret/port
  POSTGRES_DB_FILE: /etc/db-secret/dbname