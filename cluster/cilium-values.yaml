# Cilium with full kube-proxy replacement on Talos Linux

# Enable kube-proxy replacement
kubeProxyReplacement: true

# The API server address and port
# Use the control plane endpoint or load balancer address
k8sServiceHost: localhost
k8sServicePort: 6443

k8sClientRateLimit:
  qps: 10
  burst: 25

l2announcements:
  enabled: true

# IPAM configuration
ipam:
  mode: kubernetes

devices: ""

# This section replaces Ingress with Gateway API
gatewayAPI:
  enabled: false

envoy:
  enabled: false

# Talos-specific cgroup settings
cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

# Security context for Talos Linux
securityContext:
  capabilities:
    ciliumAgent:
    - CHOWN
    - KILL
    - NET_ADMIN
    - NET_RAW
    - IPC_LOCK
    - SYS_ADMIN
    - SYS_RESOURCE
    - DAC_OVERRIDE
    - FOWNER
    - SETGID
    - SETUID
    cleanCiliumState:
    - NET_ADMIN
    - SYS_ADMIN
    - SYS_RESOURCE

# Enable Hubble for observability
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true

# Enable bandwidth management
bandwidthManager:
  enabled: true

# Install on all nodes including control plane
tolerations:
- operator: Exists
  effect: NoSchedule

# Enable health checking
healthChecking: true
healthPort: 9879
