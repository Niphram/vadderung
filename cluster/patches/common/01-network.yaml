apiVersion: v1alpha1
kind: LinkAliasConfig
name: net0
selector:
  match: true # Only one physical interface
---
apiVersion: v1alpha1
kind: LinkConfig
name: net0
# addresses:
#     - address: 192.168.1.100/24
routes:
- gateway: 192.168.178.1

# ---
# apiVersion: v1alpha1
# kind: DHCPv4Config
# name: net0
# clientIdentifier: mac
---
apiVersion: v1alpha1
kind: DHCPv6Config
name: net0
clientIdentifier: mac
---
apiVersion: v1alpha1
kind: ResolverConfig
nameservers:
- address: 192.168.178.1
- address: 1.1.1.1
- address: 1.0.0.1
searchDomains:
  disableDefault: true
